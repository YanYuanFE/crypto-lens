name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Generate Xcode project
        run: ruby scripts/generate_xcodeproj.rb
      - name: Test
        run: >-
          xcodebuild test
          -project CryptoLens.xcodeproj
          -scheme CryptoLens
          -destination 'platform=macOS'
          -derivedDataPath .build/CIDerivedData
          CODE_SIGNING_ALLOWED=NO
          ONLY_ACTIVE_ARCH=YES
      - name: Verify String Catalog
        run: ruby scripts/verify_localizations.rb .build/CIDerivedData
      - name: Verify product scope
        run: ruby scripts/verify_scope.rb
      - name: Verify icon assets
        run: ruby scripts/verify_assets.rb
      - name: Verify distribution script syntax
        run: >-
          bash -n
          scripts/build_local_beta.sh
          scripts/install_local_beta.sh
          scripts/build_unnotarized_dmg.sh
          scripts/build_release.sh
          scripts/verify_release_artifact.sh
